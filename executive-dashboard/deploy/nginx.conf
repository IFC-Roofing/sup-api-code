# Sup Executive Dashboard — nginx config
# Place in /etc/nginx/sites-available/sup-dashboard

server {
    listen 80;
    server_name sup.ifcroofing.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name sup.ifcroofing.com;

    ssl_certificate /etc/letsencrypt/live/sup.ifcroofing.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sup.ifcroofing.com/privkey.pem;

    # Dashboard app (port 8091)
    location / {
        proxy_pass http://127.0.0.1:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Existing Sup API (port 8090) — /v1 routes
    location /v1/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Chat streaming support
    location /api/chat {
        proxy_pass http://127.0.0.1:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
    }
}
